<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(20px); border: 1px solid rgba(167,139,250,0.3); }
        .btn { transition: all 0.4s ease; }
        .btn:hover { transform: translateY(-4px) scale(1.05); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">

    <div class="max-w-2xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold text-violet-400 mb-4">NexusHub</h1>
            <p class="text-xl text-zinc-400">Crea. Graba. Conecta.</p>
        </div>

        <!-- Botones principales -->
        <div class="space-y-6">
            <button onclick="signInWithGoogle()" 
                    class="w-full py-6 glass rounded-3xl font-semibold text-xl btn flex items-center justify-center gap-3">
                <i class="fa-brands fa-google"></i> Iniciar con Google
            </button>

            <button onclick="uploadVideo()" 
                    class="w-full py-6 glass rounded-3xl font-semibold text-xl btn">
                📤 Subir Video / Short
            </button>

            <button onclick="openAIChat()" 
                    class="w-full py-6 glass rounded-3xl font-semibold text-xl btn">
                🤖 IA Nexus Privada
            </button>

            <button onclick="showTrends()" 
                    class="w-full py-6 glass rounded-3xl font-semibold text-xl btn">
                🔥 Hacer Trend
            </button>
        </div>

        <!-- Videos -->
        <div class="mt-16">
            <h2 class="text-3xl font-bold mb-6">Videos Globales</h2>
            <div id="videoFeed" class="space-y-8"></div>
        </div>

        <!-- Chat -->
        <div class="mt-16">
            <h2 class="text-3xl font-bold mb-6">Chat Global</h2>
            <div id="chatMessages" class="h-80 overflow-y-auto glass rounded-3xl p-6 mb-6"></div>
            <div class="flex gap-3">
                <input id="chatInput" placeholder="Mensaje seguro..." 
                       class="flex-1 bg-zinc-900 p-4 rounded-2xl border border-white/10"
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-10 bg-violet-600 rounded-2xl font-semibold btn">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        function signInWithGoogle() {
            alert("Iniciar con Google - Esta función requiere configuración completa en Supabase");
        }

        function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = () => {
                alert("Video seleccionado. En una versión completa se subiría a Supabase.");
            };
            input.click();
        }

        function openAIChat() {
            const message = prompt("Habla con IA Nexus:", "Hola, ¿cómo estás?");
            if (message) alert("IA Nexus: Recibí tu mensaje: " + message);
        }

        function showTrends() {
            alert("Trend Creator abierto - Próximamente podrás publicar con hashtags");
        }

        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const chat = document.getElementById("chatMessages");
            chat.innerHTML += `<p><strong>Tú:</strong> ${input.value}</p>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = "";
        }

        // Cargar al inicio
        window.onload = () => {
            console.log("%cNexusHub cargado", "color: violet; font-size: 16px");
        };
    </script>
</body>
</html>
