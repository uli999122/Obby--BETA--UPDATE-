<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(24px); border: 1px solid rgba(167,139,250,0.3); }
        .btn { transition: all 0.3s ease; }
        .btn:hover { transform: translateY(-3px); }
    </style>
</head>
<body class="bg-zinc-950 text-white">

    <div class="max-w-7xl mx-auto p-6">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-5xl font-bold text-violet-400">NexusHub</h1>
            <button onclick="signInWithGitHub()" class="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-2xl flex items-center gap-3">
                <i class="fa-brands fa-github"></i> Iniciar con GitHub
            </button>
        </div>

        <!-- Videos Section -->
        <div class="mb-16">
            <h2 class="text-4xl font-bold mb-6">Videos Globales</h2>
            <button onclick="uploadVideo()" class="bg-violet-600 hover:bg-violet-500 px-8 py-4 rounded-2xl font-semibold flex items-center gap-3 mb-8">
                <i class="fa-solid fa-upload"></i> Subir Video
            </button>
            <div id="videoFeed" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- Chat -->
        <div>
            <h2 class="text-4xl font-bold mb-6">Chat Global • Moderado</h2>
            <div id="chatMessages" class="h-96 overflow-y-auto bg-zinc-900 rounded-3xl p-6 mb-6"></div>
            <div class="flex gap-4">
                <input id="chatInput" placeholder="Mensaje seguro..." class="flex-1 bg-zinc-900 p-4 rounded-2xl border border-white/10">
                <button onclick="sendMessage()" class="bg-violet-600 px-10 rounded-2xl font-semibold">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        let currentUser = null;
        let username = "Usuario";

        // Login con GitHub
        async function signInWithGitHub() {
            await supabase.auth.signInWithOAuth({ provider: 'github' });
        }

        // Subir video con detección de Roblox
        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                let title = prompt("Título del video:", "Mi video increíble");

                // Detección automática de Roblox
                if (file.name.toLowerCase().includes("roblox") || title.toLowerCase().includes("roblox")) {
                    title += " #roblox #robloxgames #nexusroblox";
                }

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) return alert(error.message);

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                await supabase.from('videos').insert({
                    title: title,
                    video_url: videoUrl,
                    username: username
                });

                alert("¡Video subido con éxito!");
                loadVideos();
            };
            input.click();
        }

        async function loadVideos() {
            const { data } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <video src="${v.video_url}" controls class="w-full aspect-video object-cover"></video>
                    <div class="p-6">
                        <p class="font-semibold text-lg">${v.title}</p>
                        <p class="text-sm text-zinc-400">Por ${v.username}</p>
                        <div class="flex gap-6 mt-4">
                            <button class="flex items-center gap-2 text-red-400"><i class="fa-solid fa-heart"></i> Like</button>
                            <button class="flex items-center gap-2">Comentar</button>
                            <button class="flex items-center gap-2">Compartir</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Chat con moderación
        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const msg = document.createElement("div");
            msg.innerHTML = `<strong>${username}:</strong> ${input.value}`;
            document.getElementById("chatMessages").appendChild(msg);
            document.getElementById("chatMessages").scrollTop = 999999;
            input.value = "";
        }

        // Inicializar
        window.onload = async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                currentUser = data.session.user;
                username = currentUser.user_metadata?.preferred_username || "Usuario";
                loadVideos();
            }
        };
    </script>
</body>
</html>
