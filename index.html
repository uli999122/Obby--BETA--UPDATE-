<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(24px); border: 1px solid rgba(167,139,250,0.3); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- Registro -->
    <div id="registerModal" class="fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-10 max-w-md w-full mx-4">
            <h2 class="text-4xl font-bold text-center mb-8">Únete a NexusHub</h2>
            
            <input id="username" type="text" placeholder="Nombre de usuario" 
                   class="w-full p-4 bg-zinc-900 rounded-2xl mb-4 text-lg focus:outline-none focus:border-violet-500">

            <input id="birthdate" type="date" 
                   class="w-full p-4 bg-zinc-900 rounded-2xl mb-8 text-lg">

            <button onclick="registerUser()" 
                    class="w-full py-5 bg-gradient-to-r from-violet-600 to-fuchsia-600 rounded-2xl font-semibold text-xl hover:scale-105 transition">
                Entrar a NexusHub
            </button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="mainApp" class="hidden pt-20 px-6 max-w-7xl mx-auto">
        <h1 class="text-5xl font-bold text-violet-400 mb-6">NexusHub</h1>
        <p class="mb-10">Bienvenido, <span id="displayName" class="font-semibold text-violet-300"></span></p>

        <div class="mb-12">
            <h2 class="text-3xl font-bold mb-6">Videos Globales</h2>
            <button onclick="uploadVideo()" class="bg-violet-600 px-8 py-4 rounded-2xl mb-8 font-semibold">
                Subir Video desde Galería
            </button>
            <div id="videoFeed" class="grid grid-cols-1 gap-8"></div>
        </div>

        <div>
            <h2 class="text-3xl font-bold mb-6">Chat Global</h2>
            <div id="chatMessages" class="h-96 overflow-y-auto bg-zinc-900 rounded-3xl p-6 mb-6"></div>
            <div class="flex gap-4">
                <input id="chatInput" placeholder="Mensaje seguro..." 
                       class="flex-1 bg-zinc-900 p-4 rounded-2xl border border-white/10"
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-10 bg-violet-600 rounded-2xl font-semibold">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        let currentUsername = "";

        async function registerUser() {
            const username = document.getElementById("username").value.trim();
            const birthdate = document.getElementById("birthdate").value;

            if (!username || !birthdate) {
                alert("Por favor completa todos los campos");
                return;
            }

            const birthYear = new Date(birthdate).getFullYear();
            const age = 2026 - birthYear;

            if (age < 14) {
                alert("Debes tener al menos 14 años para usar NexusHub.");
                return;
            }

            // Guardar en Supabase
            const { error } = await supabase.from('profiles').insert({
                username: username,
                birthdate: birthdate
            });

            if (error) {
                alert("Error al registrar: " + error.message);
            } else {
                currentUsername = username;
                localStorage.setItem("nexusUsername", username);

                document.getElementById("registerModal").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                document.getElementById("displayName").textContent = username;

                alert("¡Registro exitoso! Bienvenido a NexusHub");
            }
        }

        // Subir video
        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const title = prompt("Título del video:", "Mi video increíble");

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) return alert("Error al subir: " + error.message);

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                await supabase.from('videos').insert({
                    username: currentUsername,
                    title: title,
                    video_url: videoUrl
                });

                alert("Video subido correctamente");
                loadVideos();
            };
            input.click();
        }

        async function loadVideos() {
            const { data } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <video src="${v.video_url}" controls class="w-full h-64 object-cover"></video>
                    <div class="p-5">
                        <p class="font-semibold">${v.title}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Chat simple (local por ahora)
        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const chat = document.getElementById("chatMessages");
            chat.innerHTML += `<p><strong>${currentUsername}:</strong> ${input.value}</p>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = "";
        }

        // Inicio
        window.onload = () => {
            const saved = localStorage.getItem("nexusUsername");
            if (saved) {
                currentUsername = saved;
                document.getElementById("registerModal").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                document.getElementById("displayName").textContent = saved;
                loadVideos();
            }
        };
    </script>
</body>
</html>
