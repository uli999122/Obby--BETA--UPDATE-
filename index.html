<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(24px); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <!-- Registro Obligatorio -->
    <div id="registerModal" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="glass rounded-3xl p-10 max-w-md w-full mx-4">
            <h2 class="text-4xl font-bold text-center mb-8">Únete a NexusHub</h2>
            <input id="username" type="text" placeholder="Nombre de usuario" class="w-full p-4 bg-zinc-900 rounded-2xl mb-4 text-lg">
            <input id="birthdate" type="date" class="w-full p-4 bg-zinc-900 rounded-2xl mb-6 text-lg">
            <button onclick="registerUser()" class="w-full py-5 bg-gradient-to-r from-violet-600 to-fuchsia-600 rounded-2xl font-semibold text-xl">Entrar</button>
        </div>
    </div>

    <!-- App Principal -->
    <div id="mainApp" class="hidden pt-20 px-6 max-w-7xl mx-auto">
        <h1 class="text-5xl font-bold text-violet-400 mb-8">NexusHub</h1>
        <p class="mb-8">Bienvenido, <span id="displayName" class="font-semibold"></span></p>

        <!-- Videos -->
        <div class="mb-16">
            <h2 class="text-3xl font-bold mb-6">Videos Globales</h2>
            <button onclick="uploadVideo()" class="bg-violet-600 px-8 py-4 rounded-2xl mb-8 font-semibold flex items-center gap-3">
                <i class="fa-solid fa-upload"></i> Subir Video desde Galería
            </button>
            <div id="videoFeed" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- Chat Global -->
        <div>
            <h2 class="text-3xl font-bold mb-6">Chat Global</h2>
            <div id="chatMessages" class="h-96 overflow-y-auto bg-zinc-900/70 rounded-3xl p-6 mb-6"></div>
            <div class="flex gap-4">
                <input id="chatInput" type="text" placeholder="Mensaje seguro..." 
                       class="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-6 py-5 focus:outline-none focus:border-violet-500"
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-10 bg-violet-600 rounded-2xl font-semibold">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';   // Tu anon key

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        let currentUsername = "";

        // Registro
        async function registerUser() {
            const username = document.getElementById("username").value.trim();
            const birthdate = document.getElementById("birthdate").value;

            if (!username || !birthdate) return alert("Completa todos los campos");

            const birthYear = new Date(birthdate).getFullYear();
            const age = 2026 - birthYear;

            if (age < 14) {
                alert("Lo sentimos, debes tener al menos 14 años para usar NexusHub.");
                return;
            }

            const { error } = await supabase.from('profiles').insert({ username, birthdate });
            if (error) {
                alert("Error: " + error.message);
            } else {
                currentUsername = username;
                document.getElementById("registerModal").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                document.getElementById("displayName").textContent = username;
                loadVideos();
                loadChat();
            }
        }

        // Subir video
        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const title = prompt("Título del video:", "Mi video en NexusHub");

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) return alert(error.message);

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                await supabase.from('videos').insert({
                    user_id: (await supabase.auth.getUser()).data.user?.id || null,
                    title: title,
                    video_url: videoUrl,
                    duration: 3600
                });

                alert("¡Video subido correctamente!");
                loadVideos();
            };
            input.click();
        }

        async function loadVideos() {
            const { data } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <video src="${v.video_url}" controls class="w-full aspect-video object-cover"></video>
                    <div class="p-5">
                        <p class="font-semibold text-lg">${v.title}</p>
                        <div class="flex gap-6 mt-4 text-sm text-zinc-400">
                            <span>❤️ ${v.likes || 0}</span>
                            <span>💬 Comentar</span>
                            <span>🔗 Compartir</span>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Chat Global
        function loadChat() {
            supabase.channel('messages')
                .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
                    const chat = document.getElementById('chatMessages');
                    chat.innerHTML += `<p><strong>${payload.new.username}:</strong> ${payload.new.content}</p>`;
                    chat.scrollTop = chat.scrollHeight;
                })
                .subscribe();
        }

        async function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            await supabase.from('messages').insert({
                username: currentUsername,
                content: input.value
            });
            input.value = "";
        }

        // Inicio
        window.onload = () => {
            // Si ya está registrado en local (para pruebas)
            const savedUser = localStorage.getItem("nexusUsername");
            if (savedUser) {
                currentUsername = savedUser;
                document.getElementById("registerModal").classList.add("hidden");
                document.getElementById("mainApp").classList.remove("hidden");
                document.getElementById("displayName").textContent = savedUser;
                loadVideos();
                loadChat();
            }
        };
    </script>
</body>
</html>
