<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(24px); border: 1px solid rgba(167,139,250,0.3); }
        .btn { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .btn:hover { transform: translateY(-4px) scale(1.05); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">

    <div class="max-w-7xl mx-auto">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold text-violet-400 mb-4">NexusHub</h1>
            <p class="text-xl text-zinc-400">Crea. Graba. Conecta.</p>
        </div>

        <!-- Botón Login -->
        <button onclick="signInWithGoogle()" 
                class="w-full py-6 bg-white text-black rounded-3xl font-semibold text-xl mb-12 flex items-center justify-center gap-4">
            <i class="fa-brands fa-google text-2xl"></i> Iniciar con Google
        </button>

        <!-- Botones principales -->
        <div class="grid grid-cols-1 gap-6">
            <button onclick="uploadVideo()" 
                    class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-video text-6xl mb-6 text-pink-400"></i>
                <h3 class="text-3xl font-semibold">Subir Video / Short</h3>
                <p class="text-zinc-400 mt-2">Desde galería</p>
            </button>

            <button onclick="openAIChat()" 
                    class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-brain text-6xl mb-6 text-cyan-400"></i>
                <h3 class="text-3xl font-semibold">IA Nexus Privada</h3>
                <p class="text-zinc-400 mt-2">Habla con IA inteligente</p>
            </button>
        </div>

        <!-- Videos -->
        <div class="mt-16">
            <h2 class="text-3xl font-bold mb-6">Videos Globales</h2>
            <div id="videoFeed" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- Chat -->
        <div class="mt-16">
            <h2 class="text-3xl font-bold mb-6">Chat Global</h2>
            <div id="chatMessages" class="h-80 overflow-y-auto bg-zinc-900 rounded-3xl p-6 mb-6"></div>
            <div class="flex gap-3">
                <input id="chatInput" placeholder="Mensaje seguro..." 
                       class="flex-1 bg-zinc-900 p-4 rounded-2xl border border-white/10"
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-10 bg-violet-600 rounded-2xl font-semibold">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        let username = "Usuario";

        // Login con Google
        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
            if (error) alert("Error: " + error.message);
        }

        // Subir Video
        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const title = prompt("Título del video:", "Mi video increíble") || "Sin título";

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) return alert("Error al subir: " + error.message);

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                await supabase.from('videos').insert({
                    title: title,
                    video_url: videoUrl,
                    username: username
                });

                alert("¡Video subido correctamente!");
                loadVideos();
            };
            input.click();
        }

        // Cargar videos
        async function loadVideos() {
            const { data } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <video src="${v.video_url}" controls class="w-full aspect-video object-cover"></video>
                    <div class="p-6">
                        <p class="font-semibold">${v.title}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Enviar mensaje
        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const chat = document.getElementById("chatMessages");
            chat.innerHTML += `<p><strong>${username}:</strong> ${input.value}</p>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = "";
        }

        // IA
        function openAIChat() {
            alert("🤖 IA Nexus activada\n\nHola, ¿en qué te ayudo hoy?");
        }

        // Inicializar
        window.onload = async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                username = data.session.user.user_metadata?.name || "Usuario";
                loadVideos();
            }
        };
    </script>
</body>
</html>
