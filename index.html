<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(20px); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen p-6">

    <h1 class="text-5xl font-bold text-violet-400 mb-10 text-center">NexusHub</h1>

    <!-- Botón Login Google -->
    <button onclick="signInWithGoogle()" 
            class="w-full py-5 bg-white text-black rounded-2xl font-semibold mb-12 flex items-center justify-center gap-3 text-lg">
        <i class="fa-brands fa-google"></i> Iniciar con Google
    </button>

    <!-- Subir Video -->
    <div class="mb-12">
        <button onclick="uploadVideo()" 
                class="w-full py-6 bg-violet-600 hover:bg-violet-500 rounded-3xl font-semibold text-xl mb-4">
            📤 Subir Video desde Galería
        </button>
    </div>

    <!-- Feed de Videos -->
    <div class="mb-12">
        <h2 class="text-3xl font-bold mb-6">Videos Globales</h2>
        <div id="videoFeed" class="space-y-10"></div>
    </div>

    <!-- Chat -->
    <div>
        <h2 class="text-3xl font-bold mb-6">Chat Global</h2>
        <div id="chatMessages" class="h-80 overflow-y-auto bg-zinc-900 rounded-3xl p-6 mb-6 text-sm"></div>
        <div class="flex gap-3">
            <input id="chatInput" placeholder="Escribe un mensaje..." 
                   class="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-6 py-5 focus:outline-none"
                   onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()" class="px-10 bg-violet-600 rounded-2xl font-semibold">Enviar</button>
        </div>
    </div>

    <script>
        // === CONFIGURA TUS DATOS AQUÍ ===
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        let currentUsername = "Usuario";

        // Login con Google
        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google'
            });
            if (error) alert("Error: " + error.message);
        }

        // Subir Video
        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const title = prompt("Título del video:", "Mi video en NexusHub") || "Sin título";

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) {
                    alert("Error al subir video: " + error.message);
                    return;
                }

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                const { error: insertError } = await supabase.from('videos').insert({
                    title: title,
                    video_url: videoUrl,
                    username: currentUsername
                });

                if (insertError) alert("Error guardando video");
                else {
                    alert("¡Video subido correctamente!");
                    loadVideos();
                }
            };
            input.click();
        }

        // Cargar videos
        async function loadVideos() {
            const { data, error } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            if (error) return console.error(error);

            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden";
                div.innerHTML = `
                    <video src="${v.video_url}" controls class="w-full aspect-video"></video>
                    <div class="p-5">
                        <p class="font-semibold">${v.title}</p>
                        <p class="text-sm text-zinc-400">Por ${v.username}</p>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // Enviar mensaje en chat
        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const chat = document.getElementById("chatMessages");
            chat.innerHTML += `<p><strong>${currentUsername}:</strong> ${input.value}</p>`;
            chat.scrollTop = chat.scrollHeight;
            input.value = "";
        }

        // Inicializar
        window.onload = async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                currentUsername = data.session.user.user_metadata?.full_name || data.session.user.user_metadata?.name || "Usuario";
                loadVideos();
            } else {
                console.log("No hay sesión. Inicia con Google.");
            }
        };
    </script>
</body>
</html>
