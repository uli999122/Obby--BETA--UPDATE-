<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub • Crea. Graba. Conecta.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(28px); border: 1px solid rgba(167,139,250,0.3); }
        .btn { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .btn:hover { transform: translateY(-4px) scale(1.05); }
        .video-card { transition: all 0.5s ease; }
        .video-card:hover { transform: scale(1.03); }
    </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 via-purple-950 to-black text-white min-h-screen">

    <div class="max-w-7xl mx-auto px-6 py-8">
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-3xl flex items-center justify-center text-4xl animate-pulse">✦</div>
                <h1 class="title text-5xl font-bold tracking-tighter text-violet-400">NexusHub</h1>
            </div>
            <button onclick="signInWithGoogle()" 
                    class="btn flex items-center gap-3 bg-white text-black px-6 py-3 rounded-2xl font-semibold">
                <i class="fa-brands fa-google"></i> Iniciar con Google
            </button>
        </div>

        <!-- Botones principales -->
        <div class="grid grid-cols-2 gap-6 mb-16">
            <button onclick="uploadVideo()" class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-video text-6xl mb-6 text-pink-400"></i>
                <h3 class="text-3xl font-semibold">Subir Video / Short</h3>
                <p class="text-zinc-400">Desde galería o cámara</p>
            </button>

            <button onclick="openAIChat()" class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-brain text-6xl mb-6 text-cyan-400"></i>
                <h3 class="text-3xl font-semibold">IA Nexus</h3>
                <p class="text-zinc-400">Chat privado inteligente</p>
            </button>
        </div>

        <!-- Videos Feed -->
        <div>
            <h2 class="text-4xl font-bold mb-8 title">Videos Globales</h2>
            <div id="videoFeed" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- Chat -->
        <div class="mt-16">
            <h2 class="text-4xl font-bold mb-8 title">Chat Global • Moderado</h2>
            <div id="chatMessages" class="h-96 overflow-y-auto glass rounded-3xl p-6 mb-6"></div>
            <div class="flex gap-4">
                <input id="chatInput" placeholder="Mensaje seguro..." 
                       class="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-6 py-5 focus:outline-none focus:border-violet-500"
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-10 bg-violet-600 rounded-2xl font-semibold">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        let currentUser = null;
        let username = "Usuario";

        // Login con Google
        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
            if (error) alert(error.message);
        }

        // Subir Video / Short con detección Roblox
        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                let title = prompt("Título del video:", "Mi video increíble");

                // Detección automática de Roblox
                if (title.toLowerCase().includes("roblox") || file.name.toLowerCase().includes("roblox")) {
                    title += " #roblox #robloxgames #nexusroblox";
                }

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) return alert("Error al subir: " + error.message);

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                await supabase.from('videos').insert({
                    title: title,
                    video_url: videoUrl,
                    username: username
                });

                alert("¡Video subido correctamente!");
                loadVideos();
            };
            input.click();
        }

        async function loadVideos() {
            const { data } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden video-card";
                div.innerHTML = `
                    <video src="${v.video_url}" controls class="w-full aspect-video object-cover"></video>
                    <div class="p-6">
                        <p class="font-semibold text-lg">${v.title}</p>
                        <p class="text-sm text-zinc-400">Por ${v.username}</p>
                        <div class="flex gap-8 mt-6 text-sm">
                            <button class="flex items-center gap-2 hover:text-red-400"><i class="fa-solid fa-heart"></i> Like</button>
                            <button class="flex items-center gap-2 hover:text-blue-400">Comentar</button>
                            <button onclick="copyVideoLink('${v.video_url}')" class="flex items-center gap-2 hover:text-emerald-400">Copiar Link</button>
                        </div>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function copyVideoLink(url) {
            navigator.clipboard.writeText(url);
            alert("¡Link copiado! Puedes compartirlo en Google o donde quieras.");
        }

        // Chat con moderación
        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const msg = document.createElement("div");
            msg.className = "mb-4";
            msg.innerHTML = `<strong>${username}:</strong> ${input.value}`;
            document.getElementById("chatMessages").appendChild(msg);
            document.getElementById("chatMessages").scrollTop = 999999;
            input.value = "";
        }

        // Inicializar
        window.onload = async () => {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                currentUser = data.session.user;
                username = currentUser.user_metadata?.full_name || currentUser.user_metadata?.name || "Usuario";
                loadVideos();
            }
        };
    </script>
</body>
</html>
