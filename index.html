<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub • Crea. Graba. Conecta.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .title { font-family: 'Space Grotesk', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(28px); border: 1px solid rgba(167,139,250,0.3); }
        .btn { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .btn:hover { transform: translateY(-6px) scale(1.06); }
        .video-card { transition: all 0.6s ease; }
        .video-card:hover { transform: scale(1.04); box-shadow: 0 25px 50px -12px rgba(167,139,250,0.5); }
        .message { animation: slideIn 0.4s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gradient-to-br from-zinc-950 via-purple-950 to-black text-white min-h-screen">

    <div class="max-w-7xl mx-auto px-6 py-8">
        <!-- Header -->
        <div class="flex justify-between items-center mb-12">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-gradient-to-br from-violet-500 to-fuchsia-500 rounded-3xl flex items-center justify-center text-4xl animate-pulse">✦</div>
                <h1 class="title text-5xl font-bold tracking-tighter text-violet-400">NexusHub</h1>
            </div>
            <button onclick="signInWithGoogle()" 
                    class="btn flex items-center gap-3 bg-white text-black px-6 py-3 rounded-2xl font-semibold">
                <i class="fa-brands fa-google"></i> Iniciar con Google
            </button>
        </div>

        <!-- Botones principales -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-16">
            <button onclick="uploadVideo()" class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-video text-6xl mb-6 text-pink-400"></i>
                <h3 class="text-3xl font-semibold">Subir Video / Short</h3>
                <p class="text-zinc-400 mt-2">Desde galería o cámara</p>
            </button>

            <button onclick="openAIChat()" class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-brain text-6xl mb-6 text-cyan-400"></i>
                <h3 class="text-3xl font-semibold">IA Nexus Privada</h3>
                <p class="text-zinc-400 mt-2">Inteligencia que aprende de ti</p>
            </button>

            <button onclick="showTrends()" class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-fire text-6xl mb-6 text-orange-400"></i>
                <h3 class="text-3xl font-semibold">Hacer Trend</h3>
                <p class="text-zinc-400 mt-2">Publicaciones virales</p>
            </button>
        </div>

        <!-- Videos Feed (estilo TikTok) -->
        <div class="mb-16">
            <h2 class="text-4xl font-bold mb-8 title">Videos Globales</h2>
            <div id="videoFeed" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>

        <!-- Chat Global -->
        <div>
            <h2 class="text-4xl font-bold mb-8 title">Chat Global • Moderado por IA</h2>
            <div id="chatMessages" class="h-96 overflow-y-auto glass rounded-3xl p-6 mb-6 space-y-4"></div>
            <div class="flex gap-4">
                <input id="chatInput" placeholder="Mensaje seguro..." 
                       class="flex-1 bg-zinc-900 border border-white/10 rounded-2xl px-6 py-5 focus:outline-none focus:border-violet-500"
                       onkeypress="if(event.key==='Enter') sendMessage()">
                <button onclick="sendMessage()" class="px-10 bg-violet-600 rounded-2xl font-semibold btn">Enviar</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== FILTRO DE GROSERÍAS FUERTE ====================
        const badWords = ["puta","puto","mierda","joder","cabron","pendejo","verga","coño","hijueputa","gonorrea","ctm","weon","fuck","shit","bitch","asshole","madarchod","bhenchod","сука","блядь","randi","gaandu"];

        function filterText(text) {
            let filtered = text;
            badWords.forEach(word => {
                const regex = new RegExp(word, "gi");
                filtered = filtered.replace(regex, "●●●");
            });
            return filtered;
        }

        let currentUsername = "Usuario";

        // Login con Google
        function signInWithGoogle() {
            alert("Iniciar con Google - En versión completa se conectará con Supabase");
        }

        // Subir Video con detección Roblox
        function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = () => {
                let title = prompt("Título del video:", "Mi video increíble") || "Sin título";

                if (title.toLowerCase().includes("roblox")) {
                    title += " #roblox #robloxgames #nexusroblox";
                }

                alert(`Video "${title}" subido correctamente (en versión completa se guardaría en Supabase)`);
                addVideoToFeed(title);
            };
            input.click();
        }

        function addVideoToFeed(title) {
            const container = document.getElementById('videoFeed');
            const div = document.createElement('div');
            div.className = "glass rounded-3xl overflow-hidden video-card";
            div.innerHTML = `
                <div class="h-64 bg-zinc-800 flex items-center justify-center text-7xl">🎥</div>
                <div class="p-6">
                    <p class="font-semibold text-lg">${title}</p>
                    <p class="text-sm text-zinc-400">Por ${currentUsername}</p>
                    <div class="flex gap-8 mt-6 text-sm">
                        <button class="flex items-center gap-2 hover:text-red-400"><i class="fa-solid fa-heart"></i> Like</button>
                        <button class="flex items-center gap-2 hover:text-blue-400">Comentar</button>
                        <button onclick="copyLink()" class="flex items-center gap-2 hover:text-emerald-400">Compartir</button>
                    </div>
                </div>
            `;
            container.appendChild(div);
        }

        function copyLink() {
            alert("Link copiado para compartir");
        }

        // Chat con moderación
        function sendMessage() {
            const input = document.getElementById("chatInput");
            if (!input.value.trim()) return;

            const filtered = filterText(input.value);

            const msg = document.createElement("div");
            msg.className = "message flex gap-4";
            msg.innerHTML = `
                <div class="w-9 h-9 bg-gradient-to-br from-violet-500 to-pink-500 rounded-2xl flex-shrink-0"></div>
                <div>
                    <p class="font-medium text-violet-300">${currentUsername}</p>
                    <p class="text-zinc-200">${filtered}</p>
                </div>
            `;
            document.getElementById("chatMessages").appendChild(msg);
            document.getElementById("chatMessages").scrollTop = 999999;
            input.value = "";
        }

        // IA Nexus
        function openAIChat() {
            const msg = prompt("Habla con IA Nexus:", "Hola, ¿cómo estás?");
            if (msg) alert("🤖 IA Nexus: Recibí tu mensaje. Estoy aprendiendo de ti.");
        }

        function showTrends() {
            alert("🔥 Trend Creator abierto\n\nPróximamente podrás crear publicaciones virales");
        }

        // Inicializar con animación
        window.onload = () => {
            console.log("%cNexusHub cargado con moderación y animaciones", "color:#a78bfa; font-size:16px");
        };
    </script>
</body>
</html>
