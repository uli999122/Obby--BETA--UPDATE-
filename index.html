<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20,20,40,0.95); backdrop-filter: blur(24px); border: 1px solid rgba(167,139,250,0.3); }
        .btn { transition: all 0.4s cubic-bezier(0.4,0,0.2,1); }
        .btn:hover { transform: translateY(-4px) scale(1.05); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-7xl mx-auto p-6">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold text-violet-400 mb-4">NexusHub</h1>
            <p class="text-xl text-zinc-400">Crea. Graba. Conecta.</p>
        </div>

        <button onclick="signInWithGoogle()" 
                class="w-full py-6 bg-white text-black rounded-3xl font-semibold text-xl flex items-center justify-center gap-4 mb-12 btn">
            <i class="fa-brands fa-google text-2xl"></i> Iniciar con Google
        </button>

        <div class="grid grid-cols-1 gap-6">
            <button onclick="uploadVideo()" class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-video text-6xl mb-6 text-pink-400"></i>
                <h3 class="text-3xl font-semibold">Subir Video / Short</h3>
            </button>

            <button onclick="openAI()" class="glass rounded-3xl p-10 text-left btn">
                <i class="fa-solid fa-brain text-6xl mb-6 text-cyan-400"></i>
                <h3 class="text-3xl font-semibold">IA Nexus Privada</h3>
            </button>
        </div>

        <div class="mt-16">
            <h2 class="text-3xl font-bold mb-6">Videos Globales</h2>
            <div id="videoFeed" class="grid grid-cols-1 md:grid-cols-2 gap-8"></div>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://iqistneahtdwefgvoyrk.supabase.co';
        const supabaseAnonKey = 'sb_publishable_n8_5XLedwQAPq24bWa_9ZQ_I0yqYXix';

        const supabase = Supabase.createClient(supabaseUrl, supabaseAnonKey);

        async function signInWithGoogle() {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://nexushub-4hq1.vercel.app' }
            });
        }

        async function uploadVideo() {
            const input = document.createElement("input");
            input.type = "file";
            input.accept = "video/*";
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const title = prompt("Título del video:", "Mi video increíble") || "Sin título";

                const { data, error } = await supabase.storage.from('videos').upload(file.name, file);
                if (error) return alert("Error: " + error.message);

                const videoUrl = `${supabaseUrl}/storage/v1/object/public/videos/${file.name}`;

                await supabase.from('videos').insert({ title, video_url: videoUrl });
                alert("Video subido!");
                loadVideos();
            };
            input.click();
        }

        async function loadVideos() {
            const { data } = await supabase.from('videos').select('*').order('created_at', { ascending: false });
            const container = document.getElementById('videoFeed');
            container.innerHTML = '';
            data.forEach(v => {
                const div = document.createElement('div');
                div.className = "glass rounded-3xl overflow-hidden";
                div.innerHTML = `<video src="${v.video_url}" controls class="w-full aspect-video"></video><div class="p-6"><p class="font-semibold">${v.title}</p></div>`;
                container.appendChild(div);
            });
        }

        window.onload = () => {
            loadVideos();
        };
    </script>
</body>
</html>
